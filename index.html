<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💖 To Min</title>
    <style>
        /* 全局样式：温柔渐变背景 + 柔光 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background: linear-gradient(145deg, #fce4ec 0%, #ffe0f0 100%);
            color: #5e3a4c;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;  /* 让背景不干扰点击 */
            z-index: 0;
        }
        .content {
            position: relative;
            z-index: 10;
            max-width: 600px;
            width: 90%;
            margin: 30px auto;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 30px 20px;
            box-shadow: 0 20px 40px rgba(214, 144, 174, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        h1 {
            font-size: 2.2rem;
            margin: 0 0 10px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 rgba(255,255,255,0.8);
            text-align: center;
        }
        .sub {
            text-align: center;
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 30px;
            font-style: italic;
        }
        /* 拍立得照片墙 */
        .polaroid-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
        }
        .polaroid {
            background: white;
            padding: 10px 10px 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transform: rotate(-2deg);
            transition: 0.3s;
            width: 150px;
            border-radius: 4px;
        }
        .polaroid:nth-child(even) {
            transform: rotate(3deg);
        }
        .polaroid:hover {
            transform: scale(1.05) rotate(0deg);
            box-shadow: 0 20px 30px rgba(190, 120, 140, 0.3);
        }
        .polaroid img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 2px;
            display: block;
        }
        .polaroid p {
            margin: 8px 0 0;
            font-size: 0.85rem;
            text-align: center;
            color: #4a3b3f;
        }
        /* 倒计时卡片 */
        .countdown-box {
            background: #fff0f5;
            border-radius: 60px;
            padding: 15px 25px;
            margin: 30px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #ffb6c1;
        }
        .days-number {
            font-size: 3rem;
            font-weight: bold;
            color: #c14a5e;
            line-height: 1;
        }
        .days-text {
            font-size: 1rem;
            color: #8b5a62;
        }
        /* 打字机情书 */
        .love-letter {
            background: rgba(255, 240, 245, 0.7);
            border-left: 6px solid #ff99aa;
            padding: 20px;
            border-radius: 16px;
            margin-top: 20px;
            font-size: 1.1rem;
            line-height: 1.6;
            word-break: break-word;
        }
        .cursor {
            display: inline-block;
            width: 3px;
            background-color: #c14a5e;
            animation: blink 1s infinite;
            margin-left: 4px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #9b6b73;
            text-align: center;
        }
        a {
            color: #b3475c;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <!-- 爱心粒子画布 -->
    <canvas id="heartCanvas"></canvas>

    <div class="content">
        <h1>💘 亲爱的 <span style="color:#d44e6b;">Min</span></h1>
        <div class="sub">✨ 浅浅纪念一下 ✨</div>

        <!-- 拍立得照片区 — 替换成你们的合照 -->
        <div class="polaroid-grid">
            <div class="polaroid">
                <img src="./images/christmas2025.jpg" alt="photo1">
                <p>2025 Christmas</p>
            </div>
            <div class="polaroid">
                <img src="./images/libarary.jpg" alt="photo2">
                <p>2026.6.8 libarary</p>
            </div>
            <div class="polaroid">
                <img src="./images/xjtu.jpg" alt="photo3">
                <p>2026.6.8 xjtu</p>
            </div>
        </div>

        <!-- 纪念日倒计时 -->
        <div class="countdown-box">
            <span style="font-size:1.2rem;">💗 在一起已经</span>
            <span class="days-number" id="daysCount">0</span>
            <span class="days-text">天</span>
        </div>

        <!-- 动态情书区域 -->
        <div class="love-letter">
            <p id="typewriter"></p>
        </div>

        <div class="footer">
            ⚡ 你的 · Yao ⚡<br>
            <span style="font-size:0.7rem;">10· 6 · 2026</span>
        </div>
    </div>

    <script>
        // ==================== 1. 爱心粒子动画 ====================
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function initCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            createHeartParticles();
        }

        function createHeartParticles() {
            particles = [];
            const heartFormula = (x, y) => {
                // 心形线公式: (x²+y²-1)³ - x²*y³ = 0  稍微缩放
                const x1 = (x - width/2) / (width/4);
                const y1 = (height/2 - y) / (height/4);
                const val = Math.pow(x1*x1 + y1*y1 - 0.6, 3) - x1*x1 * Math.pow(y1, 3);
                return val < 0.1;  // 调整阈值控制爱心粗细
            };

            for (let i = 0; i < 600; i++) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                if (heartFormula(x, y)) {
                    particles.push({
                        x, y,
                        size: Math.random() * 2.5 + 1,
                        speedY: Math.random() * 0.5 + 0.2,
                        opacity: Math.random() * 0.7 + 0.3,
                        color: `rgba(219, 112, 147, ${Math.random()*0.6+0.2})` // 粉红系
                    });
                }
            }
            // 补一些随机飘散的粒子
            for (let i = 0; i < 200; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 0.8,
                    speedY: Math.random() * 0.3 + 0.1,
                    opacity: Math.random() * 0.5 + 0.1,
                    color: `rgba(255, 182, 193, ${Math.random()*0.5})`
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 6;
                ctx.shadowColor = 'rgba(255, 105, 180, 0.6)';
                ctx.fill();
                // 移动：缓缓向上飘，重置到底部
                p.y -= p.speedY;
                if (p.y < -10) {
                    p.y = height + 10;
                    p.x = Math.random() * width;
                }
            });
            requestAnimationFrame(drawParticles);
        }

        window.addEventListener('resize', () => {
            initCanvas();
        });
        initCanvas();
        drawParticles();

        // ==================== 2. 纪念日计算 ====================
        function updateDays() {
            // ⚠️ 修改成你们在一起的日期！
            const startDate = new Date('2025-12-23'); // YYYY-MM-DD
            const today = new Date();
            const diffTime = today - startDate;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            document.getElementById('daysCount').innerText = diffDays >= 0 ? diffDays : 0;
        }
        updateDays();

        // ==================== 3. 打字机情书 ====================
        const letter = [
            "图书馆相遇 ",
            "开启一段奇妙的时空之旅 ",
            "爱你",
            "Min"
        ];

        let line = 0;
        let index = 0;
        let currentText = '';
        const output = document.getElementById('typewriter');

        function type() {
            if (line < letter.length) {
                if (index < letter[line].length) {
                    currentText += letter[line][index];
                    output.innerHTML = currentText + '<span class="cursor"> </span>';
                    index++;
                    setTimeout(type, 80);
                } else {
                    currentText += '<br>';
                    output.innerHTML = currentText + '<span class="cursor"> </span>';
                    line++;
                    index = 0;
                    setTimeout(type, 300);
                }
            } else {
                // 结束闪烁光标
                output.innerHTML = currentText;
            }
        }
        type();
    </script>
</body>
</html>
